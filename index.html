<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NMPA Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML += '<div style="color:red; z-index:9999; position:absolute; top:0; background:white; padding:20px; width:100%;">' + msg + '<br>' + src + ':' + line + '</div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red; z-index:9999; position:absolute; top:0; background:white; padding:20px; width:100%;">Unhandled Rejection: ' + (event.reason && event.reason.stack ? event.reason.stack : event.reason) + '</div>';
      });
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
